<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ATL Mural – Augmented</title>
  <style>
    :root { --accent: #ff6b35; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    #scene { position: relative; width: 100%; height: 100%; }

    #mural {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    /* AR overlay layer */
    #ar-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #ar-layer.visible { opacity: 1; }

    #smoke-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Hand-rolled cigarette — sits at her raised fingers */
    #cig-wrap {
      position: absolute;
      left: 26%;
      top: 38%;
      width: 9%;
      min-width: 60px;
      max-width: 130px;
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
      filter: drop-shadow(0 0 8px rgba(255, 100, 30, 0.85));
    }
    #cig-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    #ar-layer.visible #cig-wrap { opacity: 1; }

    /* --- UI chrome --- */
    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #label {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(0,0,0,1);
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      bottom: 108px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    #toggle {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;

      background: rgba(8, 8, 8, 0.72);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #toggle:active { transform: translateX(-50%) scale(0.96); }

    #toggle.on {
      background: rgba(255, 107, 53, 0.22);
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(255,107,53,0.4), inset 0 0 12px rgba(255,107,53,0.1);
    }
  </style>
</head>
<body>

<div id="scene">
  <img id="mural" src="mural.jpg" alt="ATL Mural">

  <div id="ar-layer">
    <canvas id="smoke-canvas"></canvas>

    <!-- Hand-rolled cigarette image -->
    <div id="cig-wrap">
      <img src="cig.png" alt="">
    </div>
  </div>
</div>

<div id="ui">
  <div id="label">ATL Mural &nbsp;·&nbsp; Augmented Reality</div>
  <div id="hint">tap to reveal</div>
  <button id="toggle" onclick="toggleAR()">Augment</button>
</div>

<script>
const canvas  = document.getElementById('smoke-canvas');
const ctx     = canvas.getContext('2d');
const arLayer = document.getElementById('ar-layer');
const btn     = document.getElementById('toggle');
const hint    = document.getElementById('hint');

let isOn = false, animId = null, particles = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Smoke particle ── */
class Puff {
  constructor(x, y) {
    this.x  = x + (Math.random() - 0.5) * 8;
    this.y  = y;
    this.vx = (Math.random() - 0.5) * 0.7;
    this.vy = -(Math.random() * 1.4 + 0.5);
    this.r  = Math.random() * 6 + 2.5;
    this.life    = 0;
    this.maxLife = Math.random() * 110 + 60;
    this.hue = Math.random() * 50 + 185;   // blue-gray range
    this.sat = Math.random() * 15 + 5;
    this.lit = Math.random() * 25 + 58;
    this.wobble  = Math.random() * 0.1 + 0.03;
    this.wobbleO = Math.random() * Math.PI * 2;
  }
  tick() {
    const t = this.life;
    this.x  += this.vx + Math.sin(t * this.wobble + this.wobbleO) * 0.35;
    this.vx += (Math.random() - 0.5) * 0.05;
    this.y  += this.vy;
    this.r  += 0.20;
    this.life++;
    this.alpha = Math.pow(1 - this.life / this.maxLife, 1.2) * 0.32;
    return this.life < this.maxLife;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha})`);
    g.addColorStop(1, `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* Locate the cigarette ember tip in screen coordinates after CSS rotation */
function emberPoint() {
  const el = document.getElementById('cig-wrap');
  if (!el) return { x: canvas.width * 0.305, y: canvas.height * 0.45 };

  const rect = el.getBoundingClientRect();
  // Lit/twisted end is at the top-left of the PNG (~10% x, ~8% y)
  return {
    x: rect.left + rect.width  * 0.10,
    y: rect.top  + rect.height * 0.08
  };
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const pt = emberPoint();
  const emit = Math.random() < 0.45 ? 2 : 1;
  for (let i = 0; i < emit; i++) particles.push(new Puff(pt.x, pt.y));

  // Thin wispy stream near the ember — constant thin line before puffs expand
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = 'rgba(220,220,240,0.6)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
  ctx.bezierCurveTo(
    pt.x - 2, pt.y - 18,
    pt.x + 4, pt.y - 32,
    pt.x - 1, pt.y - 44
  );
  ctx.stroke();
  ctx.restore();

  if (particles.length > 220) particles.splice(0, particles.length - 220);
  particles = particles.filter(p => { const a = p.tick(); if (a) p.draw(); return a; });

  animId = requestAnimationFrame(loop);
}

function toggleAR() {
  isOn = !isOn;
  if (isOn) {
    arLayer.classList.add('visible');
    btn.textContent = 'Remove';
    btn.classList.add('on');
    hint.classList.add('hidden');
    loop();
  } else {
    arLayer.classList.remove('visible');
    btn.textContent = 'Augment';
    btn.classList.remove('on');
    cancelAnimationFrame(animId); animId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = [];
  }
}
</script>
</body>
</html>

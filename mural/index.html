<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ATL Mural – Augmented</title>
  <style>
    :root { --accent: #ff6b35; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    #scene { position: relative; width: 100%; height: 100%; }

    #mural {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    /* Smoke canvas — inside ar-layer (opacity transition OK for canvas) */
    #ar-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #ar-layer.visible { opacity: 1; }

    #smoke-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Cigarette lives OUTSIDE ar-layer so mix-blend/transparency works correctly.
       Stacking context from opacity on ar-layer would break it if nested inside. */
    #cig-wrap {
      position: absolute;
      left: 22%;
      top: 52%;
      width: 10%;
      min-width: 55px;
      max-width: 120px;
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
      pointer-events: none;
    }
    #cig-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    #cig-wrap.visible { opacity: 1; }

    /* --- UI chrome --- */
    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #label {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(0,0,0,1);
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      bottom: 108px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    #toggle {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      background: rgba(8, 8, 8, 0.72);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #toggle:active { transform: translateX(-50%) scale(0.96); }

    #toggle.on {
      background: rgba(255, 107, 53, 0.22);
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(255,107,53,0.4), inset 0 0 12px rgba(255,107,53,0.1);
    }

    /* --- Link overlay --- */
    #links {
      position: absolute;
      bottom: 132px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease 0.6s;
    }
    #links.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .link-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(8,8,8,0.68);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 60px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.3s, border-color 0.3s;
    }
    .link-btn:active { opacity: 0.75; }
    .link-btn.site {
      border-color: rgba(255,255,255,0.5);
    }
    .link-btn.ig {
      border-color: rgba(180,100,220,0.6);
    }
    .link-btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="scene">
  <img id="mural" src="mural.jpg" alt="ATL Mural">

  <!-- Cigarette is a sibling of ar-layer, not a child — avoids opacity stacking context -->
  <div id="cig-wrap">
    <img src="cig.png" alt="">
  </div>

  <div id="ar-layer">
    <canvas id="smoke-canvas"></canvas>
  </div>
</div>

<div id="ui">
  <div id="label">ATL Mural &nbsp;·&nbsp; Augmented Reality</div>
  <div id="hint">tap to reveal</div>

  <div id="links">
    <a class="link-btn site" href="https://ummasonoma.com" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      UMMA Sonoma
    </a>
    <a class="link-btn ig" href="https://www.instagram.com/ummasonoma" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Follow @ummasonoma
    </a>
    <a class="link-btn ig" href="https://www.instagram.com/arrrtaddict" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Follow @arrrtaddict
    </a>
  </div>

  <button id="toggle" onclick="toggleAR()">Augment</button>
</div>

<script>
const canvas  = document.getElementById('smoke-canvas');
const ctx     = canvas.getContext('2d');
const arLayer = document.getElementById('ar-layer');
const cigWrap = document.getElementById('cig-wrap');
const links   = document.getElementById('links');
const btn     = document.getElementById('toggle');
const hint    = document.getElementById('hint');

let isOn = false, animId = null, particles = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Smoke — deep blue + black shadows, matches mural palette ── */
class Puff {
  constructor(x, y) {
    this.x  = x + (Math.random() - 0.5) * 14;
    this.y  = y + (Math.random() - 0.5) * 8;
    this.vx = (Math.random() - 0.35) * 1.4;
    this.vy = -(Math.random() * 2.0 + 0.9);
    this.r  = Math.random() * 12 + 7;
    this.life    = 0;
    this.maxLife = Math.random() * 140 + 90;
    this.wobble  = Math.random() * 0.07 + 0.02;
    this.wobbleO = Math.random() * Math.PI * 2;

    // Match the mural: deep blue puffs with near-black shadow puffs
    const isShadow = Math.random() < 0.35;
    if (isShadow) {
      this.hue = 220 + Math.random() * 20;
      this.sat = 20 + Math.random() * 20;
      this.lit = 8 + Math.random() * 12;   // near black
      this.maxAlpha = 0.55;
    } else {
      this.hue = 210 + Math.random() * 30;  // blue-indigo range
      this.sat = 55 + Math.random() * 30;
      this.lit = 28 + Math.random() * 22;   // deep blue
      this.maxAlpha = 0.42;
    }
  }
  tick() {
    this.x += this.vx + Math.sin(this.life * this.wobble + this.wobbleO) * 0.55;
    this.vx += (Math.random() - 0.5) * 0.04;
    this.y  += this.vy;
    this.vy *= 0.993;
    this.r  += 0.30;
    this.life++;
    this.alpha = Math.pow(1 - this.life / this.maxLife, 1.1) * this.maxAlpha;
    return this.life < this.maxLife;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0,   `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha})`);
    g.addColorStop(0.6, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha * 0.5})`);
    g.addColorStop(1,   `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* Her mouth — smoke blows out from her puffed lips */
function mouthPoint() {
  return {
    x: canvas.width  * 0.47,
    y: canvas.height * 0.54
  };
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const pt = mouthPoint();
  const emit = Math.random() < 0.5 ? 2 : 1;
  for (let i = 0; i < emit; i++) particles.push(new Puff(pt.x, pt.y));

  if (particles.length > 300) particles.splice(0, particles.length - 300);
  particles = particles.filter(p => { const a = p.tick(); if (a) p.draw(); return a; });

  animId = requestAnimationFrame(loop);
}

function toggleAR() {
  isOn = !isOn;
  if (isOn) {
    arLayer.classList.add('visible');
    cigWrap.classList.add('visible');
    links.classList.add('visible');
    btn.textContent = 'Remove';
    btn.classList.add('on');
    hint.classList.add('hidden');
    loop();
  } else {
    arLayer.classList.remove('visible');
    cigWrap.classList.remove('visible');
    links.classList.remove('visible');
    btn.textContent = 'Augment';
    btn.classList.remove('on');
    cancelAnimationFrame(animId); animId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = [];
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ATL Mural – Augmented</title>
  <style>
    :root { --accent: #ff6b35; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    #scene { position: relative; width: 100%; height: 100%; }

    #mural {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
    }

    /* AR overlay layer */
    #ar-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #ar-layer.visible { opacity: 1; }

    #smoke-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* Hand-rolled cigarette — sits between her raised fingers */
    #cig-wrap {
      position: absolute;
      left: 62%;
      top: 30%;
      width: 7%;
      min-width: 50px;
      max-width: 110px;
      transform: rotate(10deg);
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
    }
    #cig-wrap img {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: multiply;
    }
    #ar-layer.visible #cig-wrap { opacity: 1; }

    /* --- UI chrome --- */
    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

    #label {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(0,0,0,1);
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      bottom: 108px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 0.6s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    #toggle {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;

      background: rgba(8, 8, 8, 0.72);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #toggle:active { transform: translateX(-50%) scale(0.96); }

    #toggle.on {
      background: rgba(255, 107, 53, 0.22);
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(255,107,53,0.4), inset 0 0 12px rgba(255,107,53,0.1);
    }
  </style>
</head>
<body>

<div id="scene">
  <img id="mural" src="mural.jpg" alt="ATL Mural">

  <div id="ar-layer">
    <canvas id="smoke-canvas"></canvas>

    <!-- Hand-rolled cigarette image -->
    <div id="cig-wrap">
      <img src="cig.png" alt="">
    </div>
  </div>
</div>

<div id="ui">
  <div id="label">ATL Mural &nbsp;·&nbsp; Augmented Reality</div>
  <div id="hint">tap to reveal</div>
  <button id="toggle" onclick="toggleAR()">Augment</button>
</div>

<script>
const canvas  = document.getElementById('smoke-canvas');
const ctx     = canvas.getContext('2d');
const arLayer = document.getElementById('ar-layer');
const btn     = document.getElementById('toggle');
const hint    = document.getElementById('hint');

let isOn = false, animId = null, particles = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Smoke particle — blown from mouth ── */
class Puff {
  constructor(x, y) {
    this.x  = x + (Math.random() - 0.5) * 12;
    this.y  = y + (Math.random() - 0.5) * 6;
    this.vx = (Math.random() - 0.3) * 1.2;   // slight drift left (she faces left)
    this.vy = -(Math.random() * 1.8 + 0.8);   // upward
    this.r  = Math.random() * 10 + 6;          // bigger puffs — mouth-blown
    this.life    = 0;
    this.maxLife = Math.random() * 130 + 80;
    this.hue = Math.random() * 30 + 195;
    this.sat = Math.random() * 12 + 3;
    this.lit = Math.random() * 20 + 62;
    this.wobble  = Math.random() * 0.08 + 0.02;
    this.wobbleO = Math.random() * Math.PI * 2;
  }
  tick() {
    const t = this.life;
    this.x  += this.vx + Math.sin(t * this.wobble + this.wobbleO) * 0.5;
    this.vx += (Math.random() - 0.5) * 0.04;
    this.y  += this.vy;
    this.vy *= 0.995;
    this.r  += 0.28;
    this.life++;
    this.alpha = Math.pow(1 - this.life / this.maxLife, 1.1) * 0.38;
    return this.life < this.maxLife;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.alpha})`);
    g.addColorStop(1, `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* Smoke origin — her mouth/lips in the mural */
function mouthPoint() {
  return {
    x: canvas.width  * 0.47,
    y: canvas.height * 0.54
  };
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const pt = mouthPoint();
  const emit = Math.random() < 0.5 ? 2 : 1;
  for (let i = 0; i < emit; i++) particles.push(new Puff(pt.x, pt.y));

  if (particles.length > 280) particles.splice(0, particles.length - 280);
  particles = particles.filter(p => { const a = p.tick(); if (a) p.draw(); return a; });

  animId = requestAnimationFrame(loop);
}

function toggleAR() {
  isOn = !isOn;
  if (isOn) {
    arLayer.classList.add('visible');
    btn.textContent = 'Remove';
    btn.classList.add('on');
    hint.classList.add('hidden');
    loop();
  } else {
    arLayer.classList.remove('visible');
    btn.textContent = 'Augment';
    btn.classList.remove('on');
    cancelAnimationFrame(animId); animId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = [];
  }
}
</script>
</body>
</html>
